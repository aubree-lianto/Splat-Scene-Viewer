<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>splat-scene-viewer</title>
  </head>
  <body>
    <div id="app"></div>
    
    <!-- Loading Progress -->
    <div id="loading-container" class="loading-container">
      <div class="loading-bar-bg">
        <div id="loading-bar" class="loading-bar"></div>
      </div>
      <div id="loading-text" class="loading-text">Loading splat...</div>
    </div>

    <!-- Stats Display -->
    <div id="stats-panel" class="stats-panel">
      <div id="fps">FPS: 0</div>
      <div id="point-count">Points: 0</div>
      <div id="gaussian-count">Gaussians: 0</div>
    </div>

    <!-- Crosshair (shown in walk mode only) -->
    <div id="crosshair" class="crosshair">+</div>

    <!-- Walk mode controls HUD (shown in walk mode only) -->
    <div id="walk-hud" class="walk-hud">
      <div class="walk-hud-row">
        <span class="walk-hud-key walk-hud-spacer"></span><span id="hud-w" class="walk-hud-key">W</span><span class="walk-hud-key walk-hud-spacer"></span>
      </div>
      <div class="walk-hud-row">
        <span id="hud-a" class="walk-hud-key">A</span><span id="hud-s" class="walk-hud-key">S</span><span id="hud-d" class="walk-hud-key">D</span>
      </div>
      <span id="hud-mouse" class="walk-hud-label" style="display:none;">Mouse Look</span>
    </div>

    <!-- Control Buttons -->
    <div class="controls">
      <button id="frame-scene-btn">Frame Scene</button>
      <button id="reset-view-btn">Reset View</button>
      <button id="walk-mode-btn">Walk Mode</button>
    </div>

    <!-- Camera Path Recorder -->
    <div class="path-controls">
      <div class="path-header">Camera Path</div>
      <div id="keyframe-list" class="keyframe-list"></div>
      <div class="path-buttons">
        <button id="add-keyframe-btn">Add Keyframe</button>
        <button id="preview-path-btn" disabled>Preview</button>
        <button id="clear-path-btn">Clear</button>
        <button id="export-btn" disabled>Export MP4</button>
      </div>
      <div id="export-progress" class="export-progress" style="display:none;">
        <div class="export-bar-bg"><div id="export-bar" class="export-bar"></div></div>
        <div id="export-text" class="export-text">Rendering...</div>
        <button id="cancel-export-btn">Cancel</button>
      </div>
      <div id="path-status" class="path-status"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
